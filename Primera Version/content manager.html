<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consola CRUD Strapi v5 - Grupo 12</title>
    <style>
        body { font-family: monospace; margin: 20px; background: #fff; color: #000; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        th, td { border: 1px solid #000; padding: 4px 8px; text-align: left; }
        th { background: #eaeaea; }
        .controles { margin-bottom: 15px; padding: 10px; background: #f9f9f9; border: 1px dashed #000; }
        button { font-family: monospace; font-size: 12px; margin-right: 5px; cursor: pointer; }
        input { font-family: monospace; font-size: 12px; width: 250px; }
        .docid-lnk { text-decoration: underline; color: blue; cursor: pointer; }
        #contador-total { font-weight: bold; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>DB MANAGEMENT PANEL - STRAPI V5</h2>

    <div class="controles">
        <label>DOCUMENT_ID_ACTIVO: </label>
        <input type="text" id="inputDocId" placeholder="[Seleccionar alfanumérico de la lista]">
        <br><br>
        <button onclick="crearPeliculaAMano()">[1] POST (Cargar Manual)</button>
        <button onclick="verPeliculasStrapi()">[2] GET (Sincronizar Lista)</button>
        <button onclick="modificarAtributo()">[3] PUT (Modificar Titulo)</button>
        <button onclick="borrarPorId()">[4] DELETE (Borrar por documentId)</button>
        <button onclick="limpiarBibliotecaCompleta()">[5] PURGE ALL (Vaciar Servidor)</button>
    </div>

    <div id="status">Estado: Esperando comando...</div>
    <div id="contador-total">TOTAL REGISTROS EN SERVIDOR: 0</div>

    <table>
        <thead>
            <tr>
                <th>id numérico</th>
                <th>documentId (Clic para cargar)</th>
                <th>titulo</th>
                <th>sinopsis (resumen)</th>
                <th>generos</th>
                <th>cantidadVotos</th>
                <th>promedioVotos</th>
            </tr>
        </thead>
        <tbody id="tabla-cuerpo">
            <tr>
                <td colspan="7" style="text-align: center; color: #666;">Tabla vacía. Ejecute el comando [2] para leer datos.</td>
            </tr>
        </tbody>
    </table>

    <script>
        const STRAPI_URL = 'https://gestionweb.frlp.utn.edu.ar/api/grupo12-peliculas'; 
        const STRAPI_TOKEN = '8c457faa9e1976eda8492d0c470848626d5e7255008b189a8774819632c1e1c675acd69a6eaca57d7771e1c03e2b93b457f250d8007e6dcda81493b7199c7f76de93730cf2496417a057999bf78d10ddc89b11ecaa0e8787dc3abe97c79f69fde29cd958c93e7eb928419506215d60338d45ed8a9b71704b6c09a2050a64f86f';

        const headersStrapi = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${STRAPI_TOKEN}` };
        const tbody = document.getElementById('tabla-cuerpo');
        const status = document.getElementById('status');
        const contTotal = document.getElementById('contador-total');
        const inputDocId = document.getElementById('inputDocId');

        function seleccionarId(id) {
            inputDocId.value = id;
            status.innerText = `Estado: documentId cargado -> ${id}`;
        }

        // [1] POST
        async function crearPeliculaAMano() {
            status.innerText = "Estado: Enviando POST...";
            const data = { data: { titulo: "Peli Test Manual", sinopsis: "Sinopsis corta de prueba.", cantidadVotos: 100, promedioVotos: 5.0 } };
            try {
                const res = await fetch(STRAPI_URL, { method: 'POST', headers: headersStrapi, body: JSON.stringify(data) });
                if (res.ok) { status.innerText = "Estado: POST exitoso."; await verPeliculasStrapi(); }
                else status.innerText = `Estado: Error POST (${res.status})`;
            } catch (e) { status.innerText = "Estado: Error de red -> " + e.message; }
        }

        // [2] GET
        async function verPeliculasStrapi() {
            status.innerText = "Estado: Ejecutando GET...";
            try {
                const res = await fetch(`${STRAPI_URL}?status=all&pagination[pageSize]=100`, { method: 'GET', headers: headersStrapi });
                const json = await res.json();
                const pelis = json.data;
                const meta = json.meta;

                tbody.innerHTML = "";
                contTotal.innerText = `TOTAL REGISTROS EN SERVIDOR: ${meta?.pagination?.total || 0}`;

                if (!pelis || pelis.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">0 registros en Strapi.</td></tr>';
                    status.innerText = "Estado: GET completado (vacío).";
                    return;
                }

                pelis.forEach(p => {
                    const sinopsisCorta = p.sinopsis ? (p.sinopsis.substring(0, 40) + "...") : "N/A";
                    const fila = `
                        <tr>
                            <td>${p.id}</td>
                            <td><span class="docid-lnk" onclick="seleccionarId('${p.documentId}')">${p.documentId}</span></td>
                            <td>${p.titulo || 'N/A'}</td>
                            <td>${sinopsisCorta}</td>
                            <td>${p.generos || 'N/A'}</td>
                            <td>${p.cantidadVotos || 0}</td>
                            <td>${p.promedioVotos || 0}</td>
                        </tr>
                    `;
                    tbody.insertAdjacentHTML('beforeend', fila);
                });
                status.innerText = "Estado: Tabla actualizada.";
            } catch (e) { status.innerText = "Estado: Error GET -> " + e.message; }
        }

        // [3] PUT (Usa el documentId alfanumérico)
        async function modificarAtributo() {
            const docId = inputDocId.value.trim();
            if(!docId) return alert("Falta el alfanumérico documentId en el cuadro de texto");
            status.innerText = "Estado: Ejecutando PUT...";
            const data = { data: { titulo: "¡Modificado!" } };
            try {
                const res = await fetch(`${STRAPI_URL}/${docId}`, { method: 'PUT', headers: headersStrapi, body: JSON.stringify(data) });
                if (res.ok) { status.innerText = "Estado: PUT exitoso."; inputDocId.value = ""; await verPeliculasStrapi(); }
                else status.innerText = `Estado: Error PUT (${res.status})`;
            } catch (e) { status.innerText = "Estado: Error red -> " + e.message; }
        }

        // [4] DELETE INDIVIDUAL (Corregido para usar estrictamente el documentId alfanumérico en la URL de Strapi v5)
        async function borrarPorId() {
            const docId = inputDocId.value.trim();
            if(!docId) return alert("Error: El cuadro de texto está vacío. Haz clic en un documentId azul de la tabla.");
            status.innerText = `Estado: Solicitando DELETE para el documento ${docId}...`;
            try {
                // Pegamos directamente a la URL final mapeando el token alfanumérico
                const res = await fetch(`${STRAPI_URL}/${docId}`, { method: 'DELETE', headers: headersStrapi });
                if (res.ok || res.status === 204) { 
                    status.innerText = "Estado: DELETE exitoso de raíz."; 
                    inputDocId.value = ""; 
                    await verPeliculasStrapi(); 
                } else { 
                    status.innerText = `Estado: Error DELETE (${res.status})`; 
                }
            } catch (e) { status.innerText = "Estado: Error red -> " + e.message; }
        }

        // [5] PURGE MASIVO
        async function limpiarBibliotecaCompleta() {
            if (!confirm("¿Vaciar toda la BD?")) return;
            status.innerText = "Estado: Iniciando purga masiva...";
            let cont = 0;
            try {
                for (let i = 1; i <= 30; i++) {
                    const resGet = await fetch(`${STRAPI_URL}?status=all&pagination[pageSize]=40`, { method: 'GET', headers: headersStrapi });
                    const json = await resGet.json();
                    const pelis = json.data;
                    if (!pelis || pelis.length === 0) break;

                    for (const p of pelis) {
                        if (p.documentId) {
                            cont++;
                            status.innerText = `Estado: Purgando registro N° ${cont}...`;
                            await fetch(`${STRAPI_URL}/${p.documentId}`, { method: 'DELETE', headers: headersStrapi });
                        }
                    }
                    await new Promise(r => setTimeout(r, 200));
                }
                status.innerText = `Estado: Purga masiva finalizada. Elementos borrados: ${cont}`;
                await verPeliculasStrapi();
            } catch (e) { status.innerText = "Estado: Error en purga -> " + e.message; }
        }
    </script>
</body>
</html>
